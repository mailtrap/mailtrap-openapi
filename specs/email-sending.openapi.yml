  schemas:
    SendingDomain:
      type: object
      properties:
        id:
          type: integer
        domain_name:
          type: string
        demo:
          type: boolean
        compliance_status:
          type: string
          description: |
            Indicates the compliance verification status of the sending domain.
            The domain must reach `compliant` status before you can send emails
            in production.

            - `demo` - A demo domain provided by Mailtrap. Can only send emails to the account owner.
            - `demo_exhausted` - A demo domain that has used up its sending allowance. Cannot send emails.
            - `unverified_dns` - Domain DNS records have not been verified yet. Open your domain on the [Sending Domains](https://mailtrap.io/domains) page and follow the [Sending Domain Setup](https://docs.mailtrap.io/email-api-smtp/setup/sending-domain) guide.
            - `missing_company_info` - Account is missing required company information. Go to [Company Information](https://mailtrap.io/settings/account?current_tab=company_information) and fill in the required details.
            - `under_review` - Domain is undergoing automatic compliance review. No action needed — typically completes within 2 minutes.
            - `awaiting_questionnaire` - Automatic review required additional information. Open your domain on the [Sending Domains](https://mailtrap.io/domains) page and fill in the compliance questionnaire.
            - `awaiting_card_verification` - Compliance questionnaire was submitted but credit card identity verification is still needed. Open your domain on the [Sending Domains](https://mailtrap.io/domains) page and enter card details. The charged amount is refunded immediately and the card is not stored.
            - `non_compliant` - Domain did not pass compliance checks. Sending is not allowed. Contact [Mailtrap Support](mailto:support@mailtrap.io) for details and next steps.
            - `compliant` - Domain has passed all compliance checks and is ready to send emails.
            - `suspended` - Domain sending has been suspended. Contact [Mailtrap Support](mailto:support@mailtrap.io) to resolve the issue.
          enum:
            - demo
            - demo_exhausted
            - unverified_dns
            - missing_company_info
            - under_review
            - awaiting_questionnaire
            - awaiting_card_verification
            - non_compliant
            - compliant
            - suspended
        dns_verified:
          type: boolean
        dns_verified_at:
          type:
            - string
            - 'null'
          example: '2024-12-26T09:40:44.161Z'
        dns_records:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              domain:
                type: string
              name:
                type: string
              status:
                type: string
                enum:
                  - pass
                  - fail
                  - unchecked
                  - missing
                  - softfail
                  - network_error
              type:
                type: string
              value:
                type: string
        open_tracking_enabled:
          type: boolean
        click_tracking_enabled:
          type: boolean
        auto_unsubscribe_link_enabled:
          type: boolean
        custom_domain_tracking_enabled:
          type: boolean
        health_alerts_enabled:
          type: boolean
        critical_alerts_enabled:
          type: boolean
        alert_recipient_email:
          type:
            - string
            - 'null'
        permissions:
          type: object
          properties:
            can_read:
              type: boolean
            can_update:
              type: boolean
            can_destroy:
              type: boolean
      example:
        id: 435
        domain_name: mailtrap.io
        demo: false
        compliance_status: compliant
        dns_verified: true
        dns_verified_at: '2024-12-26T09:40:44.161Z'
        dns_records:
          - key: verification
            domain: ve6wza2rbpe60x7z.mailtrap.io
            type: CNAME
            value: smtp.mailtrap.live
            status: pass
            name: ve6wza2rbpe60x7z
          - key: spf
            domain: mailtrap.io
            type: TXT
            value: 'v=spf1 include:_spf.smtp.mailtrap.live ~all'
            status: pass
            name: ''
          - key: dkim1
            domain: rwmt1._domainkey.mailtrap.io
            type: CNAME
            value: rwmt1.dkim.smtp.mailtrap.live
            status: pass
            name: rwmt1._domainkey
          - key: dkim2
            domain: rwmt2._domainkey.mailtrap.io
            type: CNAME
            value: rwmt2.dkim.smtp.mailtrap.live
            status: pass
            name: rwmt2._domainkey
          - key: dmarc
            domain: _dmarc.mailtrap.io
            type: TXT
            value: 'v=DMARC1; p=none; rua=mailto:dmarc@smtp.mailtrap.live; ruf=mailto:dmarc@smtp.mailtrap.live; rf=afrf; pct=100'
            status: pass
            name: _dmarc
          - key: link_verification
            domain: mt-link.mailtrap.io
            type: CNAME
            value: t.mailtrap.live
            status: pass
            name: mt-link
        open_tracking_enabled: true
        click_tracking_enabled: true
        auto_unsubscribe_link_enabled: true
        custom_domain_tracking_enabled: true
        health_alerts_enabled: true
        critical_alerts_enabled: true
        alert_recipient_email: john.doe@mailtrap.io
        permissions:
          can_read: true
          can_update: true
          can_destroy: true

