      additionalProperties: false
      properties:
        web_ip_address:
          type: string
          nullable: true
      example:
        web_ip_address: 198.51.100.50

    EventDetailsReject:
      type: object
      description: For event_type = suspension or reject
      additionalProperties: false
      properties:
        reject_reason:
          type: string
          nullable: true
      example:
        reject_reason: Policy rejection

    EmailLogsListFilters:
      type: object
      description: |
        Key-value map of filter name to filter spec. Each spec has operator and optional value.
        Date range uses sent_after / sent_before at top level of filters (see below).
        In query params, array values use bracket notation: `filters[field][value][]=a&filters[field][value][]=b`.
      properties:
        sent_after:
          type: string
          format: date-time
          description: Start of sent-at range (ISO 8601). Must be before or equal to sent_before.
          example: '2025-01-01T00:00:00Z'
        sent_before:
          type: string
          format: date-time
          description: End of sent-at range (ISO 8601). Must be after or equal to sent_after.
          example: '2025-01-31T23:59:59Z'
        to:
          $ref: '#/components/schemas/FilterTo'
        from:
          $ref: '#/components/schemas/FilterFrom'
        subject:
          $ref: '#/components/schemas/FilterSubject'
        status:
          $ref: '#/components/schemas/FilterStatus'
        events:
          $ref: '#/components/schemas/FilterEvents'
        clicks_count:
          $ref: '#/components/schemas/FilterClicksCount'
        opens_count:
          $ref: '#/components/schemas/FilterOpensCount'
        client_ip:
          $ref: '#/components/schemas/FilterClientIp'
        sending_ip:
          $ref: '#/components/schemas/FilterSendingIp'
        email_service_provider_response:
          $ref: '#/components/schemas/FilterEmailServiceProviderResponse'
        email_service_provider:
          $ref: '#/components/schemas/FilterEmailServiceProvider'
        recipient_mx:
          $ref: '#/components/schemas/FilterRecipientMx'
        category:
          $ref: '#/components/schemas/FilterCategory'
        sending_domain_id:
          $ref: '#/components/schemas/FilterSendingDomainId'
        sending_stream:
          $ref: '#/components/schemas/FilterSendingStream'

    FilterCiEqualString:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [ci_equal, ci_not_equal]
          description: "ci_* = case-insensitive"
        value:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    FilterCiContainString:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [ci_contain, ci_not_contain]
          description: "ci_* = case-insensitive"
        value:
          type: string

    FilterEqualString:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, not_equal]
        value:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    FilterContainString:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [contain, not_contain]
        value:
          type: string

    FilterEmptyString:
      type: object
      required: [operator]
      properties:
        operator:
          type: string
          enum: [empty, not_empty]

    FilterTo:
      oneOf:
        - $ref: '#/components/schemas/FilterCiEqualString'
        - $ref: '#/components/schemas/FilterCiContainString'
      discriminator:
        propertyName: operator
        mapping:
          ci_equal: '#/components/schemas/FilterCiEqualString'
          ci_not_equal: '#/components/schemas/FilterCiEqualString'
          ci_contain: '#/components/schemas/FilterCiContainString'
          ci_not_contain: '#/components/schemas/FilterCiContainString'
      example:
        operator: ci_equal
        value: recipient@example.com

    FilterFrom:
      oneOf:
        - $ref: '#/components/schemas/FilterCiEqualString'
        - $ref: '#/components/schemas/FilterCiContainString'
      discriminator:
        propertyName: operator
        mapping:
          ci_equal: '#/components/schemas/FilterCiEqualString'
          ci_not_equal: '#/components/schemas/FilterCiEqualString'
          ci_contain: '#/components/schemas/FilterCiContainString'
          ci_not_contain: '#/components/schemas/FilterCiContainString'
      example:
        operator: ci_contain
        value: noreply@example.com

    FilterSubject:
      oneOf:
        - $ref: '#/components/schemas/FilterCiEqualString'
        - $ref: '#/components/schemas/FilterCiContainString'
        - $ref: '#/components/schemas/FilterEmptyString'
      discriminator:
        propertyName: operator
        mapping:
          ci_equal: '#/components/schemas/FilterCiEqualString'
          ci_not_equal: '#/components/schemas/FilterCiEqualString'
          ci_contain: '#/components/schemas/FilterCiContainString'
          ci_not_contain: '#/components/schemas/FilterCiContainString'
          empty: '#/components/schemas/FilterEmptyString'
          not_empty: '#/components/schemas/FilterEmptyString'
      example:
        operator: ci_contain
        value: Order confirmation

    FilterStatus:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, not_equal]
        value:
          oneOf:
            - type: string
              enum: [delivered, not_delivered, enqueued, opted_out]
            - type: array
              items:
                type: string
                enum: [delivered, not_delivered, enqueued, opted_out]

    FilterEvents:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [include_event, not_include_event]
        value:
          oneOf:
            - type: string
              enum: [delivery, open, click, bounce, spam, unsubscribe, soft_bounce, reject, suspension]
            - type: array
              items:
                type: string
                enum: [delivery, open, click, bounce, spam, unsubscribe, soft_bounce, reject, suspension]

    FilterClicksCount:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, greater_than, less_than]
        value:
          type: integer
      example:
        operator: greater_than
        value: 0

    FilterOpensCount:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, greater_than, less_than]
        value:
          type: integer
      example:
        operator: equal
        value: 1

    FilterClientIp:
      oneOf:
        - $ref: '#/components/schemas/FilterEqualString'
        - $ref: '#/components/schemas/FilterContainString'
      discriminator:
        propertyName: operator
        mapping:
          equal: '#/components/schemas/FilterEqualString'
          not_equal: '#/components/schemas/FilterEqualString'
          contain: '#/components/schemas/FilterContainString'
          not_contain: '#/components/schemas/FilterContainString'
      example:
        operator: equal
        value: 203.0.113.42

    FilterSendingIp:
      oneOf:
        - $ref: '#/components/schemas/FilterEqualString'
        - $ref: '#/components/schemas/FilterContainString'
      discriminator:
        propertyName: operator
        mapping:
          equal: '#/components/schemas/FilterEqualString'
          not_equal: '#/components/schemas/FilterEqualString'
          contain: '#/components/schemas/FilterContainString'
          not_contain: '#/components/schemas/FilterContainString'
      example:
        operator: contain
        value: 192.0.2

    FilterEmailServiceProviderResponse:
      oneOf:
        - $ref: '#/components/schemas/FilterCiEqualString'
        - $ref: '#/components/schemas/FilterCiContainString'
      discriminator:
        propertyName: operator
        mapping:
          ci_equal: '#/components/schemas/FilterCiEqualString'
          ci_not_equal: '#/components/schemas/FilterCiEqualString'
          ci_contain: '#/components/schemas/FilterCiContainString'
          ci_not_contain: '#/components/schemas/FilterCiContainString'
      example:
        operator: ci_contain
        value: User unknown

    FilterEmailServiceProvider:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, not_equal]
        value:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
      example:
        operator: equal
        value: Google

    FilterRecipientMx:
      oneOf:
        - $ref: '#/components/schemas/FilterCiEqualString'
        - $ref: '#/components/schemas/FilterCiContainString'
      discriminator:
        propertyName: operator
        mapping:
          ci_equal: '#/components/schemas/FilterCiEqualString'
          ci_not_equal: '#/components/schemas/FilterCiEqualString'
          ci_contain: '#/components/schemas/FilterCiContainString'
          ci_not_contain: '#/components/schemas/FilterCiContainString'
      example:
        operator: ci_equal
        value: gmail-smtp-in.l.google.com

    FilterCategory:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, not_equal]
        value:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
      example:
        operator: equal
        value: Welcome Email

    FilterSendingDomainId:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, not_equal]
        value:
          oneOf:
            - type: integer
            - type: array
              items:
                type: integer
      example:
        operator: equal
        value: 3938

    FilterSendingStream:
      type: object
      required: [operator, value]
      properties:
        operator:
          type: string
          enum: [equal, not_equal]
        value:
          oneOf:
            - type: string
              enum: [transactional, bulk]
            - type: array
              items:
                type: string
                enum: [transactional, bulk]
      example:
        operator: equal
        value: transactional

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: string
            example: Invalid request

  responses:
    Unauthorized:
      description: Unauthorized. Check your API credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errors:
              - "Unauthorized"

    Forbidden:
      description: Forbidden. Verify domain or check permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            errors:
              - "Forbidden"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Resource not found

    UnprocessableEntity:
      description: Validation errors
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnprocessableEntity'

    BAD_REQUEST:
      description: Bad request - invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequest'
          example:
            success: false
            errors:
              - "Invalid request parameters"

    LIMIT_EXCEEDED:
      description: Rate limit exceeded for the current account.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitExceededResponse'
          example:
            success: false
            errors:
              - "Rate limit exceeded"

    SendingDomainResponse:
      description: Sending domain details
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SendingDomain'

    CompanyInfoResponse:
      description: Company information
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '#/components/schemas/CompanyInfo'

    SendingDomainsResponse:
      description: List of sending domains
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/SendingDomain'

    GetSuppressionsResponse:
      description: List of suppressions
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Suppression'

    DeleteSuppressionResponse:
      description: Suppression deleted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Suppression'

    CreateSuppressionResponse:
      description: Suppression created
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: '#/components/schemas/Suppression'
