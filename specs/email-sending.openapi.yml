  /api/suppressions:
    get:
      summary: List suppressions
      description: |
        List and search suppressed email addresses. Returns up to 1000 suppressions per request. Use `last_id` for cursor-based pagination through large lists.

        Suppressed addresses will not receive any emails from your account.

        Rate limit: 10 requests per minute per account.
      operationId: getSuppressions
      tags:
        - suppressions
      x-codeSamples:
        - lang: shell
          label: 'cURL'
          source: |
            # Get all suppressions
            curl -X GET https://mailtrap.io/api/suppressions \
              -H 'Authorization: Bearer YOUR_API_KEY'

            # Search for specific email
            curl -X GET 'https://mailtrap.io/api/suppressions?email=suppressed@example.com' \
              -H 'Authorization: Bearer YOUR_API_KEY'
        - lang: javascript
          label: Node.js
          source: |
            import { MailtrapClient } from "mailtrap";

            const client = new MailtrapClient({
              token: process.env.MAILTRAP_API_KEY,
              accountId: YOUR_ACCOUNT_ID
            });

            async function getSuppressions() {
              // Get all suppressions
              const suppressions = await client.suppressions.getList();

              // Or search for specific email
              const filtered = await client.suppressions.getList({
                email: "suppressed@example.com"
              });

              console.log("Suppressions:", suppressions);
            }

            getSuppressions();
        - lang: php
          label: PHP
          source: |
            <?php

            use Mailtrap\Config;
            use Mailtrap\Helper\ResponseHelper;
            use Mailtrap\MailtrapSendingClient;

            $config = new Config($_ENV['MAILTRAP_API_KEY']);
            $accountId = $_ENV['MAILTRAP_ACCOUNT_ID'];

            $suppressions = (new MailtrapSendingClient($config))
                ->suppressions($accountId);

            // Get all suppressions
            $response = $suppressions->getSuppressions();

            // Or search for specific email
            $response = $suppressions->getSuppressions('suppressed@example.com');

            var_dump(ResponseHelper::toArray($response));
        - lang: python
          label: Python
          source: |
            import mailtrap as mt

            client = mt.MailtrapClient(
                token="YOUR_API_KEY",
                account_id="YOUR_ACCOUNT_ID"
            )

            # Get all suppressions
            suppressions = client.suppressions_api.suppressions.get_list()

            # Or search for specific email
            filtered = client.suppressions_api.suppressions.get_list("suppressed@example.com")

            for suppression in suppressions:
                print(f"Email: {suppression.email}, Type: {suppression.type}")
        - lang: ruby
          label: Ruby
          source: |
            require 'mailtrap'

            client = Mailtrap::Client.new(api_key: 'YOUR_API_KEY')
            suppressions = Mailtrap::SuppressionsAPI.new(
              YOUR_ACCOUNT_ID,
              client
            )

            # Get all suppressions
            all_suppressions = suppressions.list

            # Or search for specific email
            filtered = suppressions.list(email: 'suppressed@example.com')

            all_suppressions.each do |suppression|
              puts "Email: #{suppression.email}"
            end
        - lang: csharp
          label: .NET
          source: |
            using Mailtrap;
            using Mailtrap.Suppressions.Models;

            using var mailtrapFactory = new MailtrapClientFactory("YOUR_API_KEY");
            var client = mailtrapFactory.CreateClient();

            var suppressionsResource = client.Account(YOUR_ACCOUNT_ID).Suppressions();

            // Get all suppressions
            var suppressions = await suppressionsResource.Fetch();

            // Or search for specific email
            var filter = new SuppressionFilter
            {
                Email = "suppressed@example.com"
            };
            var filtered = await suppressionsResource.Fetch(filter);

            foreach (var suppression in suppressions)
            {
                Console.WriteLine($"Email: {suppression.Email}");
            }
        - lang: java
          label: Java
          source: |
            import io.mailtrap.config.MailtrapConfig;
            import io.mailtrap.factory.MailtrapClientFactory;

            var config = new MailtrapConfig.Builder()
                .token("YOUR_API_KEY")
                .build();

            var client = MailtrapClientFactory
                .createMailtrapClient(config);

            // Get all suppressions
            var suppressions = client.sendingApi().suppressions()
                .search(YOUR_ACCOUNT_ID, null);

            // Or search for specific email
            var filtered = client.sendingApi().suppressions()
                .search(YOUR_ACCOUNT_ID, "suppressed@example.com");

            suppressions.forEach(suppression ->
                System.out.println("Email: " + suppression.getEmail())
            );
            filtered.forEach(filteredSuppression ->
                System.out.println("Email: " + filteredSuppression.getEmail())
            );
      parameters:
        - name: email
          in: query
          description: Filter suppressions by exact email address (case-insensitive).
          schema:
            type: string
            format: email
            example: suppressed@example.com
        - name: start_time
          in: query
          description: Filter suppressions created at or after this timestamp (ISO 8601 format).
          schema:
            type: string
            format: date-time
            example: '2025-01-01T00:00:00Z'
        - name: end_time
          in: query
          description: Filter suppressions created at or before this timestamp (ISO 8601 format).
          schema:
            type: string
            format: date-time
            example: '2025-12-31T23:59:59Z'
        - name: last_id
          in: query
          description: The suppression UUID from the last record of the previous response. Returns records after this suppression, enabling cursor-based pagination through large lists.
          schema:
            type: string
            format: uuid
            example: 64d71bf3-1276-417b-86e1-8e66f138acfe
      responses:
        '200':
          $ref: '#/components/responses/GetSuppressionsResponse'
        '400':
          $ref: '#/components/responses/BAD_REQUEST'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/LIMIT_EXCEEDED'
    post:
      summary: Create suppression
      description: |
        Add an email address to the suppression list. Suppressed addresses will not receive any emails from your account.

        {% hint style="warning" %}
        This endpoint requires admin-level access.
        {% endhint %}

        Rate limit: 10 requests per minute per account.
      operationId: createSuppression
      tags:
        - suppressions
      x-codeSamples:
        - lang: shell
          label: 'cURL'
          source: |
            curl -X POST https://mailtrap.io/api/suppressions \
              -H 'Authorization: Bearer YOUR_API_KEY' \
              -H 'Content-Type: application/json' \
              -d '{
                "email": "user@example.com",
                "domain_id": 12345,
                "sending_stream": "transactional",
                "reason": "manual import"
              }'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, domain_id, sending_stream]
              properties:
                email:
                  type: string
                  format: email
                  description: Email address to suppress
                  example: user@example.com
                domain_id:
                  type: integer
                  description: ID of the sending domain to suppress this email for
                  example: 12345
                sending_stream:
                  type: string
                  enum: [transactional, bulk]
                  description: The sending stream to suppress this email for
                  example: transactional
                reason:
                  type: string
                  enum: [hard bounce, unsubscription, spam complaint, manual import]
                  default: manual import
                  description: Reason for the suppression. Defaults to "manual import" if omitted.
                  example: manual import
      responses:
        '201':
          $ref: '#/components/responses/CreateSuppressionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/LIMIT_EXCEEDED'
